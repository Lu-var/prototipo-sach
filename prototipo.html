<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototipo Aduanero - MVP Funcionario</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; }

/* Layout */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 224px; background: #1e3a5f; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid #1e3a5f; }
.sidebar-header h1 { font-size: 18px; font-weight: 700; }
.sidebar-header p { font-size: 12px; color: #93c5fd; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav button { width: 100%; text-align: left; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; background: none; border: none; color: #bfdbfe; cursor: pointer; }
.sidebar-nav button:hover { background: rgba(255,255,255,0.08); color: #fff; }
.sidebar-nav button.active { background: #1e3a5f; color: #fff; }
.sidebar-footer { padding: 16px; border-top: 1px solid #1e3a5f; font-size: 12px; color: #93c5fd; }
.sidebar-footer .name { font-weight: 600; color: #bfdbfe; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-title { font-size: 14px; color: #64748b; }
.header-user { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; }
.header-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1e3a5f; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content-inner { max-width: 1024px; margin: 0 auto; padding-bottom: 32px; }

/* Entry screen */
.entry-screen { min-height: 100vh; background: #f1f5f9; display: flex; align-items: center; justify-content: center; padding: 16px; }
.entry-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; max-width: 384px; width: 100%; text-align: center; }
.entry-logo { width: 64px; height: 64px; background: #1e3a5f; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.entry-logo span { color: #fff; font-size: 24px; font-weight: 700; }
.entry-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.entry-card p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
.btn-primary { width: 100%; background: #1e3a5f; color: #fff; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
.btn-primary:hover { background: #1e3a5f; }

/* Cards */
.card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
.card-pad { padding: 20px; }
.card-sm { padding: 12px; }
.section-title { font-size: 20px; font-weight: 700; color: #1e293b; }
.section-subtitle { font-size: 14px; color: #64748b; }
.field-label { font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; display: block; }

/* Filters */
.filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.filter-input { flex: 1; min-width: 200px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
.filter-input:focus { outline: none; border-color: #1e3a5f; box-shadow: 0 0 0 2px rgba(30,58,95,0.15); }
.filter-select { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; font-size: 14px; background: #fff; cursor: pointer; }
.filter-select:focus { outline: none; border-color: #1e3a5f; box-shadow: 0 0 0 2px rgba(30,58,95,0.15); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead { background: #f8fafc; }
th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #e2e8f0; }
td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
tbody tr:hover { background: #f8fafc; }
.link { color: #1d4ed8; font-weight: 500; font-size: 12px; background: none; border: none; cursor: pointer; }
.link:hover { color: #1e40af; }
.empty td { padding: 32px; text-align: center; color: #94a3b8; }
.font-mono { font-family: ui-monospace, monospace; font-size: 12px; }
.font-medium { font-weight: 500; }
.text-muted { color: #64748b; }

/* Badges */
.badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.badge-sm { padding: 2px 8px; font-size: 11px; font-weight: 500; }
.badge-amber { background: #fef3c7; color: #92400e; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-emerald { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }

/* Buttons */
.btn { display: inline-flex; align-items: center; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-emerald { background: #059669; color: #fff; }
.btn-emerald:hover:not(:disabled) { background: #047857; }
.btn-red { background: #dc2626; color: #fff; }
.btn-red:hover:not(:disabled) { background: #b91c1c; }
.btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #475569; }
.btn-outline:hover { background: #f8fafc; }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 14px; }
.btn-back { color: #1d4ed8; font-weight: 500; font-size: 14px; background: none; border: none; cursor: pointer; }
.btn-back:hover { color: #1e40af; }
.btn-block { width: 100%; justify-content: center; }

/* QR */
.qr-placeholder { width: 112px; height: 112px; background: #1e3a5f; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.qr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
.qr-dot { width: 14px; height: 14px; border-radius: 2px; }
.qr-dot.white { background: #fff; }
.qr-label { font-size: 12px; font-family: monospace; color: #64748b; margin-top: 8px; display: block; text-align: center; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
.space-y-4 > * + * { margin-top: 16px; }
.space-y-6 > * + * { margin-top: 24px; }
.space-y-3 > * + * { margin-top: 12px; }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.text-center { text-align: center; }
.pb-2 { padding-bottom: 8px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.py-8 { padding-top: 32px; padding-bottom: 32px; }
.mt-4 { margin-top: 16px; }
.ml-auto { margin-left: auto; }
.border-b { border-bottom: 1px solid #e2e8f0; }
.max-h-48 { max-height: 192px; overflow-y: auto; }

/* Select */
select { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; font-size: 14px; background: #fff; width: 100%; }
select:focus { outline: none; border-color: #1e3a5f; box-shadow: 0 0 0 2px rgba(30,58,95,0.15); }

/* Space */
.mb-6 { margin-bottom: 24px; }
.mb-4 { margin-bottom: 16px; }
.mx-auto { margin-left: auto; margin-right: auto; }
.max-w-lg { max-width: 512px; }
.mt-0_5 { margin-top: 2px; }

/* Historial entry */
.hist-entry { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #f8fafc; }
.hist-entry:last-child { border-bottom: none; }
.hist-date { color: #94a3b8; font-family: monospace; font-size: 12px; white-space: nowrap; margin-top: 2px; }
.hist-user { color: #94a3b8; font-size: 12px; margin-left: auto; white-space: nowrap; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ---- Mock Data ----
const MOCK_FUNCIONARIO = { nombre: "Carlos Muñoz", rol: "Funcionario SNA" };

const MOCK_TRAMITES = [
  { id: "TR-001", estado: "pendiente", viajero: { nombre: "Juan Pérez", rut: "12.345.678-9", pasaporte: "P123456" },
    documentos: [{ tipo: "Cédula de Identidad", numero: "12.345.678-9", vigente: true }], menor: null,
    declaracionSag: { prodAnimal: false, prodVegetal: false, descripcion: "" },
    vehiculo: { patente: "ABC-123", tipo: "Automóvil", pais: "Chile" }, qrCode: "TR-001-2026",
    controles: { sag: "pendiente", pdi: "pendiente" },
    historial: [{ fecha: "2026-06-23 10:30", accion: "Trámite creado por viajero", usuario: "Sistema" }] },
  { id: "TR-002", estado: "pendiente", viajero: { nombre: "María González", rut: "15.678.901-2", pasaporte: "" },
    documentos: [{ tipo: "Cédula de Identidad", numero: "15.678.901-2", vigente: true }, { tipo: "Pasaporte", numero: "P789012", vigente: true }],
    menor: { esMenor: true, autorizacion: "AUT-2026-045", tutorRut: "8.765.432-1" },
    declaracionSag: { prodAnimal: true, prodVegetal: false, descripcion: "Queso artesanal 2kg" }, vehiculo: null, qrCode: "TR-002-2026",
    controles: { sag: "pendiente", pdi: "pendiente" },
    historial: [{ fecha: "2026-06-23 11:15", accion: "Trámite creado por viajero", usuario: "Sistema" }] },
  { id: "TR-003", estado: "en_revision", viajero: { nombre: "Pedro Soto", rut: "20.123.456-7", pasaporte: "" },
    documentos: [{ tipo: "Cédula de Identidad", numero: "20.123.456-7", vigente: true }], menor: null,
    declaracionSag: { prodAnimal: false, prodVegetal: true, descripcion: "Manzanas 5kg" },
    vehiculo: { patente: "XYZ-789", tipo: "Camioneta", pais: "Argentina" }, qrCode: "TR-003-2026",
    controles: { sag: "aprobado", pdi: "pendiente" },
    historial: [{ fecha: "2026-06-23 09:00", accion: "Trámite creado por viajero", usuario: "Sistema" }, { fecha: "2026-06-23 09:45", accion: "Control SAG aprobado", usuario: "Carlos Muñoz" }] },
  { id: "TR-004", estado: "aprobado", viajero: { nombre: "Ana Vega", rut: "18.987.654-3", pasaporte: "P345678" },
    documentos: [{ tipo: "Cédula de Identidad", numero: "18.987.654-3", vigente: true }, { tipo: "Pasaporte", numero: "P345678", vigente: true }], menor: null,
    declaracionSag: { prodAnimal: false, prodVegetal: false, descripcion: "" },
    vehiculo: { patente: "DEF-456", tipo: "Automóvil", pais: "Chile" }, qrCode: "TR-004-2026",
    controles: { sag: "aprobado", pdi: "aprobado" },
    historial: [{ fecha: "2026-06-22 14:00", accion: "Trámite creado por viajero", usuario: "Sistema" }, { fecha: "2026-06-22 14:30", accion: "Control SAG aprobado", usuario: "Carlos Muñoz" }, { fecha: "2026-06-22 14:35", accion: "Control PDI aprobado", usuario: "Carlos Muñoz" }, { fecha: "2026-06-22 14:40", accion: "Trámite aprobado", usuario: "Carlos Muñoz" }] },
  { id: "TR-005", estado: "rechazado", viajero: { nombre: "Luis Torres", rut: "10.111.222-3", pasaporte: "" },
    documentos: [{ tipo: "Cédula de Identidad", numero: "10.111.222-3", vigente: false }], menor: null,
    declaracionSag: { prodAnimal: true, prodVegetal: true, descripcion: "Carnes y verduras sin declarar" },
    vehiculo: { patente: "GHI-789", tipo: "Bus", pais: "Perú" }, qrCode: "TR-005-2026",
    controles: { sag: "rechazado", pdi: "rechazado" },
    historial: [{ fecha: "2026-06-22 16:00", accion: "Trámite creado por viajero", usuario: "Sistema" }, { fecha: "2026-06-22 16:20", accion: "Control SAG rechazado", usuario: "Carlos Muñoz" }, { fecha: "2026-06-22 16:25", accion: "Control PDI rechazado", usuario: "Carlos Muñoz" }, { fecha: "2026-06-22 16:30", accion: "Trámite rechazado", usuario: "Carlos Muñoz" }] }
];

const ESTADOS = ["todos", "pendiente", "en_revision", "aprobado", "rechazado"];
const LABEL_ESTADO = { pendiente: { label: "Pendiente", cls: "badge-amber" }, en_revision: { label: "En Revisión", cls: "badge-blue" }, aprobado: { label: "Aprobado", cls: "badge-emerald" }, rechazado: { label: "Rechazado", cls: "badge-red" } };
const LABEL_CONTROL = { pendiente: { label: "Pendiente", cls: "badge-amber badge-sm" }, aprobado: { label: "Aprobado", cls: "badge-emerald badge-sm" }, rechazado: { label: "Rechazado", cls: "badge-red badge-sm" } };

// ---- State ----
let state = {
  loggedIn: false,
  route: "dashboard",
  selectedId: null,
  tramites: JSON.parse(JSON.stringify(MOCK_TRAMITES)),
  filtroEstado: "todos",
  filtroBusqueda: ""
};

function render() { document.getElementById("app").innerHTML = view(); }

// ---- Helpers ----
function now() { return new Date().toLocaleString("es-CL"); }

function badgeEstado(estado) {
  const s = LABEL_ESTADO[estado] || LABEL_ESTADO.pendiente;
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

function badgeControl(estado) {
  const s = LABEL_CONTROL[estado] || LABEL_CONTROL.pendiente;
  return `<span class="${s.cls}">${s.label}</span>`;
}

// ---- Views ----
function entryScreen() {
  return `<div class="entry-screen">
    <div class="entry-card">
      <div class="entry-logo"><span>A</span></div>
      <h1>Sistema Aduanero</h1>
      <p>Control Fronterizo Digital</p>
      <button class="btn-primary" onclick="action('ingresar')">Ingresar como Funcionario</button>
    </div>
  </div>`;
}

function dashboardView() {
  const { tramites, filtroEstado, filtroBusqueda } = state;
  const filtrados = tramites.filter(t => {
    if (filtroEstado !== "todos" && t.estado !== filtroEstado) return false;
    if (!filtroBusqueda) return true;
    const q = filtroBusqueda.toLowerCase();
    return t.viajero.nombre.toLowerCase().includes(q) || t.viajero.rut.includes(q) || t.id.toLowerCase().includes(q);
  });

  const estOpts = ESTADOS.map(e =>
    `<option value="${e}"${e === filtroEstado ? " selected" : ""}>${e === "todos" ? "Todos los estados" : LABEL_ESTADO[e].label}</option>`
  ).join("");

  const rows = filtrados.length === 0
    ? `<tr class="empty"><td colspan="8">No se encontraron trámites</td></tr>`
    : filtrados.map(t => `<tr>
      <td class="font-mono font-medium">${t.id}</td>
      <td class="font-medium">${t.viajero.nombre}</td>
      <td class="text-muted">${t.viajero.rut}</td>
      <td class="text-muted">${t.vehiculo ? t.vehiculo.patente : "—"}</td>
      <td>${badgeControl(t.controles.sag)}</td>
      <td>${badgeControl(t.controles.pdi)}</td>
      <td>${badgeEstado(t.estado)}</td>
      <td><button class="link" onclick="action('verDetalle','${t.id}')">Ver detalle</button></td>
    </tr>`).join("");

  return `<div class="space-y-6">
    <div><h2 class="section-title">Panel de Control</h2><p class="section-subtitle">${tramites.length} trámites registrados</p></div>

    <div class="filter-bar">
      <input class="filter-input" type="text" placeholder="Buscar por nombre, RUT o ID..." value="${filtroBusqueda}"
        oninput="action('setBusqueda', this.value)" />
      <select class="filter-select" onchange="action('setEstado', this.value)">${estOpts}</select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Viajero</th><th>RUT</th><th>Vehículo</th><th>SAG</th><th>PDI</th><th>Estado</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function escanearQRView() {
  return `<div class="max-w-lg mx-auto space-y-6">
    <h2 class="section-title">Escanear Código QR</h2>
    <div class="card card-pad text-center space-y-4">
      <div style="width:128px;height:128px;border:2px dashed #cbd5e1;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto;background:#f8fafc;">
        <span style="color:#94a3b8;font-size:12px;">[QR]</span>
      </div>
      <p style="font-size:14px;color:#64748b;">Ingrese el código QR del trámite o escanee con la cámara</p>
      <input class="filter-input" type="text" placeholder="Ej: TR-001-2026" id="qrInput"
        oninput="document.getElementById('qrError').textContent=''"
        onkeydown="if(event.key==='Enter') action('buscarQR')" />
      <p id="qrError" style="color:#dc2626;font-size:14px;display:none;"></p>
      <button class="btn-primary" onclick="action('buscarQR')">Buscar Trámite</button>
    </div>
  </div>`;
}

function tramiteDetailView() {
  const t = state.tramites.find(x => x.id === state.selectedId);
  if (!t) return `<p style="text-align:center;padding:32px;color:#94a3b8;">Trámite no encontrado</p>`;

  const docsHtml = t.documentos.map(d =>
    `<div class="flex items-center justify-between" style="font-size:14px;padding:4px 0;">
      <span>${d.tipo}: <strong>${d.numero}</strong></span>
      <span class="badge badge-sm ${d.vigente ? "badge-emerald" : "badge-red"}">${d.vigente ? "Vigente" : "Vencido"}</span>
    </div>`
  ).join("");

  const menorHtml = t.menor ? `<div class="card card-pad space-y-3">
    <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Menor de Edad</h3>
    <div style="font-size:14px;">
      <p>Requiere autorización: <strong>${t.menor.autorizacion}</strong></p>
      <p style="margin-top:4px;"><span style="color:#64748b;">Tutor RUT:</span> <strong>${t.menor.tutorRut}</strong></p>
    </div>
  </div>` : "";

  const vehHtml = t.vehiculo ? `<div class="card card-pad space-y-3">
    <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Vehículo</h3>
    <div style="font-size:14px;">
      <p>Patente: <strong>${t.vehiculo.patente}</strong></p>
      <p style="margin-top:4px;">Tipo: <strong>${t.vehiculo.tipo}</strong></p>
      <p style="margin-top:4px;">País origen: <strong>${t.vehiculo.pais}</strong></p>
    </div>
  </div>` : "";

  const qrDots = Array.from({length:25}).map(() =>
    `<div class="qr-dot ${Math.random() > 0.5 ? "white" : ""}"></div>`
  ).join("");

  const histRows = [...t.historial].reverse().map(h =>
    `<div class="hist-entry">
      <span class="hist-date">${h.fecha}</span>
      <span>${h.accion}</span>
      <span class="hist-user">${h.usuario}</span>
    </div>`
  ).join("");

  const disableActions = t.estado === "aprobado" || t.estado === "rechazado";

  return `<div class="space-y-6">
    <div class="flex items-center justify-between">
      <button class="btn-back" onclick="action('volver')">&larr; Volver al panel</button>
      ${badgeEstado(t.estado)}
    </div>
    <h2 class="section-title">Trámite ${t.id}</h2>

    <div class="grid-2">
      <div class="card card-pad space-y-3">
        <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Datos del Viajero</h3>
        <div style="font-size:14px;">
          <p><span style="color:#64748b;">Nombre:</span> <strong>${t.viajero.nombre}</strong></p>
          <p style="margin-top:4px;"><span style="color:#64748b;">RUT:</span> <strong>${t.viajero.rut}</strong></p>
          ${t.viajero.pasaporte ? `<p style="margin-top:4px;"><span style="color:#64748b;">Pasaporte:</span> <strong>${t.viajero.pasaporte}</strong></p>` : ""}
        </div>
      </div>

      <div class="card card-pad space-y-3">
        <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Documentos</h3>
        ${docsHtml}
      </div>

      ${menorHtml}

      <div class="card card-pad space-y-3">
        <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Declaración SAG</h3>
        <div style="font-size:14px;">
          <p>Prod. animal: <strong>${t.declaracionSag.prodAnimal ? "Sí" : "No"}</strong></p>
          <p style="margin-top:4px;">Prod. vegetal: <strong>${t.declaracionSag.prodVegetal ? "Sí" : "No"}</strong></p>
          ${t.declaracionSag.descripcion ? `<p style="margin-top:4px;"><span style="color:#64748b;">Detalle:</span> <strong>${t.declaracionSag.descripcion}</strong></p>` : ""}
        </div>
      </div>

      ${vehHtml}

      <div class="card card-pad space-y-3">
        <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Código QR</h3>
        <div class="text-center py-2">
          <div class="qr-placeholder"><div class="qr-grid">${qrDots}</div></div>
          <span class="qr-label">${t.qrCode}</span>
        </div>
      </div>
    </div>

    <div class="card card-pad space-y-4">
      <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Acciones de Validación</h3>
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-emerald" onclick="action('aprobar')" ${disableActions ? "disabled" : ""}>Aprobar Trámite</button>
        <button class="btn btn-red" onclick="action('rechazar')" ${disableActions ? "disabled" : ""}>Rechazar Trámite</button>
      </div>
      <div class="grid-2">
        <div><label class="field-label">Control SAG</label>
          <select onchange="action('controlSag', this.value)">
            <option value="pendiente"${t.controles.sag==="pendiente"?" selected":""}>Pendiente</option>
            <option value="aprobado"${t.controles.sag==="aprobado"?" selected":""}>Aprobado</option>
            <option value="rechazado"${t.controles.sag==="rechazado"?" selected":""}>Rechazado</option>
          </select>
        </div>
        <div><label class="field-label">Control PDI</label>
          <select onchange="action('controlPdi', this.value)">
            <option value="pendiente"${t.controles.pdi==="pendiente"?" selected":""}>Pendiente</option>
            <option value="aprobado"${t.controles.pdi==="aprobado"?" selected":""}>Aprobado</option>
            <option value="rechazado"${t.controles.pdi==="rechazado"?" selected":""}>Rechazado</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card card-pad space-y-3">
      <h3 style="font-weight:600;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">Historial del Trámite</h3>
      <div class="max-h-48">${histRows}</div>
    </div>
  </div>`;
}

// ---- Actions ----
function action(type, value) {
  switch (type) {
    case "ingresar":
      state.loggedIn = true;
      break;
    case "setBusqueda":
      state.filtroBusqueda = value;
      break;
    case "setEstado":
      state.filtroEstado = value;
      break;
    case "verDetalle":
      state.selectedId = value;
      state.route = "tramite";
      break;
    case "volver":
      state.selectedId = null;
      state.route = "dashboard";
      break;
    case "buscarQR": {
      const input = document.getElementById("qrInput");
      const err = document.getElementById("qrError");
      const val = input ? input.value.trim() : "";
      if (!val) { err.textContent = "Ingrese un código QR válido"; err.style.display = "block"; return; }
      const match = state.tramites.find(t => t.qrCode === val || t.id === val);
      if (match) { state.selectedId = match.id; state.route = "tramite"; }
      else { err.textContent = "No se encontró un trámite con ese código QR"; err.style.display = "block"; return; }
      break;
    }
    case "aprobar":
    case "rechazar": {
      const t = state.tramites.find(x => x.id === state.selectedId);
      if (!t) break;
      t.estado = type === "aprobar" ? "aprobado" : "rechazado";
      t.historial.push({ fecha: now(), accion: `Trámite ${type === "aprobar" ? "aprobado" : "rechazado"}`, usuario: MOCK_FUNCIONARIO.nombre });
      break;
    }
    case "controlSag":
    case "controlPdi": {
      const t = state.tramites.find(x => x.id === state.selectedId);
      if (!t) break;
      const control = type === "controlSag" ? "sag" : "pdi";
      t.controles[control] = value;
      t.historial.push({ fecha: now(), accion: `Control ${control.toUpperCase()} ${value === "aprobado" ? "aprobado" : value === "rechazado" ? "rechazado" : "marcado como pendiente"}`, usuario: MOCK_FUNCIONARIO.nombre });
      if (t.controles.sag === "rechazado" || t.controles.pdi === "rechazado") t.estado = "rechazado";
      else if (t.controles.sag === "aprobado" && t.controles.pdi === "aprobado") t.estado = "aprobado";
      else if ((t.controles.sag !== "pendiente" || t.controles.pdi !== "pendiente") && t.estado === "pendiente") t.estado = "en_revision";
      break;
    }
  }
  render();
}

// ---- Main ----
function view() {
  if (!state.loggedIn) return entryScreen();

  const navItems = [
    { id: "dashboard", label: "Panel de Control" },
    { id: "escanear", label: "Escanear QR" }
  ];

  const navHtml = navItems.map(item =>
    `<button class="${state.route === item.id ? "active" : ""}" onclick="action('${item.id === 'dashboard' ? 'volver' : 'setRoute'}', '${item.id}')">${item.label}</button>`
  ).join("");

  let bodyHtml = "";
  if (state.route === "dashboard") bodyHtml = dashboardView();
  else if (state.route === "escanear") bodyHtml = escanearQRView();
  else if (state.route === "tramite") bodyHtml = tramiteDetailView();

  return `<div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Sistema Aduanero</h1>
        <p>Control Fronterizo</p>
      </div>
      <nav class="sidebar-nav">${navHtml}</nav>
      <div class="sidebar-footer">
        <p class="name">${MOCK_FUNCIONARIO.nombre}</p>
        <p>${MOCK_FUNCIONARIO.rol}</p>
      </div>
    </div>
    <div class="main">
      <div class="header">
        <div class="header-title">${state.route === "dashboard" ? "Panel de Control" : state.route === "escanear" ? "Escanear QR" : `Trámite ${state.selectedId}`}</div>
        <div class="header-user">
          <div class="header-avatar">${MOCK_FUNCIONARIO.nombre.charAt(0)}</div>
          ${MOCK_FUNCIONARIO.nombre}
        </div>
      </div>
      <div class="content">
        <div class="content-inner">${bodyHtml}</div>
      </div>
    </div>
  </div>`;
}

// Extra action for setting route
function setRoute(r) { state.route = r; state.selectedId = null; render(); }
// Override action to include setRoute
const origAction = action;
action = function(type, value) {
  if (type === "setRoute") { setRoute(value); return; }
  origAction(type, value);
};

render();
</script>
</body>
</html>
